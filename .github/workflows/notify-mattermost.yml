name: Notify Mattermost on merged bot PRs

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  checks: read
  pull-requests: read

jobs:
  notify:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      (github.event.pull_request.user.login == 'renovate[bot]' || github.event.pull_request.user.login == 'dependabot[bot]') &&
      (contains(github.event.pull_request.labels.*.name, 'patch') || contains(github.event.pull_request.labels.*.name, 'minor'))
    runs-on: ubuntu-latest
    steps:
      - name: Verify checks succeeded
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          if [ -z "$SHA" ]; then
            echo "Missing merge_commit_sha" >&2
            exit 1
          fi

          checks_json=$(gh api -H "Accept: application/vnd.github+json" \
            "/repos/$REPO/commits/$SHA/check-runs?per_page=100")
          statuses_json=$(gh api -H "Accept: application/vnd.github+json" \
            "/repos/$REPO/commits/$SHA/status")

          failed_checks=$(echo "$checks_json" | jq -r '
            [.check_runs[]
              | select(.status == "completed")
              | select((.conclusion // "") | IN("success","neutral","skipped") | not)
              | .name] | unique | .[]' || true)

          failed_statuses=$(echo "$statuses_json" | jq -r '
            [.statuses[]
              | select((.state // "") != "success")
              | .context] | unique | .[]' || true)

          if [ -n "$failed_checks" ] || [ -n "$failed_statuses" ]; then
            echo "Checks/statuses not successful; skipping notification" >&2
            exit 1
          fi

      - name: Notify Mattermost
        env:
          MATTERMOST_BOT_TOKEN: ${{ secrets.MATTERMOST_BOT_TOKEN }}
          MATTERMOST_CHANNEL_ID: ${{ secrets.MATTERMOST_CHANNEL_ID }}
          MATTERMOST_BASE_URL: ${{ secrets.MATTERMOST_BASE_URL }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_USER: ${{ github.event.pull_request.user.login }}
          MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
        run: |
          if [ -z "$MATTERMOST_BOT_TOKEN" ] || [ -z "$MATTERMOST_CHANNEL_ID" ] || [ -z "$MATTERMOST_BASE_URL" ]; then
            exit 0
          fi
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          payload=$(jq -n \
            --arg channel_id "$MATTERMOST_CHANNEL_ID" \
            --arg message "[$REPO] PR #$PR_NUMBER: \"$PR_TITLE\" ($PR_USER) merged to main by $MERGED_BY at $TIMESTAMP\n$PR_URL" \
            '{channel_id: $channel_id, message: $message}')
          curl -fS -X POST \
            -H "Authorization: Bearer $MATTERMOST_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$MATTERMOST_BASE_URL/api/v4/posts"
