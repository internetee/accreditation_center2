name: Notify Mattermost on merged bot PRs

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  pull-requests: read

jobs:
  notify:
    if: >
      github.event.pull_request.merged == true &&
      (github.event.pull_request.user.login == 'dependabot[bot]' || github.event.pull_request.user.login == 'dependabot' || github.event.pull_request.user.login == 'renovate[bot]' || github.event.pull_request.user.login == 'renovate') &&
      contains(github.event.pull_request.labels.*.name, 'auto-merge-enabled')
    runs-on: ubuntu-latest
    steps:
      - name: Send Mattermost message
        env:
          MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          if [ -z "${MATTERMOST_WEBHOOK_URL:-}" ]; then
            echo "MATTERMOST_WEBHOOK_URL missing; skipping" >&2
            exit 0
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")

          payload=$(jq -n \
            --arg text "🤖 [$REPO] PR #$PR_NUMBER: \"$PR_TITLE\" was auto-merged.\nMerged at: $TIMESTAMP\nLink: $PR_URL" \
            '{text: $text}')

          curl -fS -X POST \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$MATTERMOST_WEBHOOK_URL"

