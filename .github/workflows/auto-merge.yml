name: Auto approve & merge Dependabot and Renovate PRs

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled]
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-approve-merge:
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      github.event.pull_request.user.login == 'dependabot' ||
      github.event.pull_request.user.login == 'renovate[bot]' ||
      github.event.pull_request.user.login == 'renovate'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install GitHub CLI and jq
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install -y gh jq

      - name: Auto approve PR
        uses: hmarr/auto-approve-action@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Dependabot metadata
        if: github.event.pull_request.user.login == 'dependabot[bot]' || github.event.pull_request.user.login == 'dependabot'
        id: metadata
        uses: dependabot/fetch-metadata@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if PR should be auto-merged
        id: check_auto_merge
        env:
          UPDATE_TYPE: ${{ steps.metadata.outputs['update-type'] }}
          ACTOR: ${{ github.event.pull_request.user.login }}
          LABELS: ${{ toJson(github.event.pull_request.labels) }}
        run: |
          UPDATE_TYPE="${UPDATE_TYPE:-unknown}"

          if [ "$ACTOR" == "dependabot[bot]" ] || [ "$ACTOR" == "dependabot" ]; then
            if [[ "$UPDATE_TYPE" == "version-update:semver-patch" ]] || [[ "$UPDATE_TYPE" == "version-update:semver-minor" ]]; then
              echo "auto_merge=true" >> $GITHUB_OUTPUT
              if [[ "$UPDATE_TYPE" == "version-update:semver-minor" ]]; then
                echo "level_label=minor" >> $GITHUB_OUTPUT
              else
                echo "level_label=patch" >> $GITHUB_OUTPUT
              fi
            else
              echo "auto_merge=false" >> $GITHUB_OUTPUT
              echo "update_type=${UPDATE_TYPE}" >> $GITHUB_OUTPUT
            fi
          elif [ "$ACTOR" == "renovate[bot]" ] || [ "$ACTOR" == "renovate" ]; then
            LABEL_NAMES=$(echo "$LABELS" | jq -r '.[].name' | tr '\n' ' ')
            if [[ "$LABEL_NAMES" == *"patch"* ]] || [[ "$LABEL_NAMES" == *"minor"* ]]; then
              echo "auto_merge=true" >> $GITHUB_OUTPUT
            else
              echo "auto_merge=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "auto_merge=false" >> $GITHUB_OUTPUT
            echo "update_type=${UPDATE_TYPE}" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Ensure patch/minor label exists (Dependabot only)
        if: steps.check_auto_merge.outputs.auto_merge == 'true' && (github.event.pull_request.user.login == 'dependabot[bot]' || github.event.pull_request.user.login == 'dependabot')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LEVEL_LABEL: ${{ steps.check_auto_merge.outputs.level_label }}
        run: |
          if [ -n "$LEVEL_LABEL" ]; then
            gh pr edit "$PR_NUMBER" --add-label "$LEVEL_LABEL" || true
          fi

      - name: Wait for CI checks
        if: steps.check_auto_merge.outputs.auto_merge == 'true'
        uses: lewagon/wait-on-check-action@v1.7.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30
          timeout-minutes: 30
          check-regexp: 'test'

      - name: Mark PR as auto-merge enabled
        if: steps.check_auto_merge.outputs.auto_merge == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo
            const issue_number = context.payload.pull_request.number
            const name = 'auto-merge-enabled'

            try {
              await github.rest.issues.createLabel({
                owner,
                repo,
                name,
                color: '0e8a16',
                description: 'Auto-merge was enabled by workflow'
              })
            } catch (e) {
              if (e.status !== 422) throw e
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: [name]
            })

      - name: Enable GitHub auto-merge
        if: steps.check_auto_merge.outputs.auto_merge == 'true'
        run: |
          echo "Enabling GitHub auto-merge for PR #${{ github.event.pull_request.number }}"
          gh pr merge --auto --merge "${{ github.event.pull_request.number }}" || {
            echo "Auto-merge enable failed, continuing..."
            exit 0
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
