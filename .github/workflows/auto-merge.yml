name: Auto approve & merge Dependabot and Renovate PRs

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-approve-merge:
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      github.event.pull_request.user.login == 'dependabot' ||
      github.event.pull_request.user.login == 'renovate[bot]' ||
      github.event.pull_request.user.login == 'renovate'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install GitHub CLI and jq
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install -y gh jq

      - name: Auto approve PR
        uses: hmarr/auto-approve-action@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Dependabot metadata
        if: github.event.pull_request.user.login == 'dependabot[bot]' || github.event.pull_request.user.login == 'dependabot'
        id: metadata
        uses: dependabot/fetch-metadata@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if PR should be auto-merged
        id: check_auto_merge
        env:
          UPDATE_TYPE: ${{ steps.metadata.outputs['update-type'] }}
          ACTOR: ${{ github.event.pull_request.user.login }}
          LABELS: ${{ toJson(github.event.pull_request.labels) }}
        run: |
          UPDATE_TYPE="${UPDATE_TYPE:-unknown}"

          if [ "$ACTOR" == "dependabot[bot]" ] || [ "$ACTOR" == "dependabot" ]; then
            if [[ "$UPDATE_TYPE" == "version-update:semver-patch" ]] || [[ "$UPDATE_TYPE" == "version-update:semver-minor" ]]; then
              echo "auto_merge=true" >> $GITHUB_OUTPUT
              if [[ "$UPDATE_TYPE" == "version-update:semver-minor" ]]; then
                echo "level_label=minor" >> $GITHUB_OUTPUT
              else
                echo "level_label=patch" >> $GITHUB_OUTPUT
              fi
            else
              echo "auto_merge=false" >> $GITHUB_OUTPUT
              echo "update_type=${UPDATE_TYPE}" >> $GITHUB_OUTPUT
            fi
          elif [ "$ACTOR" == "renovate[bot]" ] || [ "$ACTOR" == "renovate" ]; then
            LABEL_NAMES=$(echo "$LABELS" | jq -r '.[].name' | tr '\n' ' ')
            if [[ "$LABEL_NAMES" == *"patch"* ]] || [[ "$LABEL_NAMES" == *"minor"* ]]; then
              echo "auto_merge=true" >> $GITHUB_OUTPUT
            else
              echo "auto_merge=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "auto_merge=false" >> $GITHUB_OUTPUT
            echo "update_type=${UPDATE_TYPE}" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Ensure patch/minor label exists (Dependabot only)
        if: steps.check_auto_merge.outputs.auto_merge == 'true' && (github.event.pull_request.user.login == 'dependabot[bot]' || github.event.pull_request.user.login == 'dependabot')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LEVEL_LABEL: ${{ steps.check_auto_merge.outputs.level_label }}
        run: |
          if [ -n "$LEVEL_LABEL" ]; then
            gh pr edit "$PR_NUMBER" --add-label "$LEVEL_LABEL" || true
          fi

      - name: Wait for CI checks
        if: steps.check_auto_merge.outputs.auto_merge == 'true'
        uses: lewagon/wait-on-check-action@v1.7.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30
          timeout-minutes: 30
          check-regexp: 'test'

      - name: Auto-merge PR
        if: steps.check_auto_merge.outputs.auto_merge == 'true'
        id: auto_merge_pr
        run: |
          echo "Attempting to auto-merge PR #${{ github.event.pull_request.number }}"
          if gh pr merge --auto --merge "${{ github.event.pull_request.number }}"; then
            echo "merge_succeeded=true" >> $GITHUB_OUTPUT
            echo "Merged successfully"
          else
            echo "merge_succeeded=false" >> $GITHUB_OUTPUT
            echo "Auto-merge failed, continuing..."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait until PR is merged
        if: steps.check_auto_merge.outputs.auto_merge == 'true' && steps.auto_merge_pr.outputs.merge_succeeded == 'true'
        id: wait_until_merged
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          for i in $(seq 1 90); do
            pr_json=$(gh pr view "$PR_NUMBER" --json merged,mergedAt,state,baseRefName,url,title,author)
            merged=$(echo "$pr_json" | jq -r '.merged')
            state=$(echo "$pr_json" | jq -r '.state')
            if [ "$merged" = "true" ] && [ "$state" = "MERGED" ]; then
              echo "merged=true" >> $GITHUB_OUTPUT
              echo "merged_at=$(echo "$pr_json" | jq -r '.mergedAt')" >> $GITHUB_OUTPUT
              echo "pr_url=$(echo "$pr_json" | jq -r '.url')" >> $GITHUB_OUTPUT
              echo "pr_title=$(echo "$pr_json" | jq -r '.title')" >> $GITHUB_OUTPUT
              echo "pr_author=$(echo "$pr_json" | jq -r '.author.login')" >> $GITHUB_OUTPUT
              exit 0
            fi
            sleep 20
          done
          echo "merged=false" >> $GITHUB_OUTPUT
          exit 0

      - name: Notify Mattermost about merge
        if: steps.wait_until_merged.outputs.merged == 'true'
        env:
          MATTERMOST_BOT_TOKEN: ${{ secrets.MATTERMOST_BOT_TOKEN }}
          MATTERMOST_CHANNEL_ID: ${{ secrets.MATTERMOST_CHANNEL_ID }}
          MATTERMOST_BASE_URL: ${{ secrets.MATTERMOST_BASE_URL }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ steps.wait_until_merged.outputs.pr_title }}
          PR_URL: ${{ steps.wait_until_merged.outputs.pr_url }}
          PR_AUTHOR: ${{ steps.wait_until_merged.outputs.pr_author }}
          MERGED_AT: ${{ steps.wait_until_merged.outputs.merged_at }}
        run: |
          if [ -z "$MATTERMOST_BOT_TOKEN" ] || [ -z "$MATTERMOST_CHANNEL_ID" ] || [ -z "$MATTERMOST_BASE_URL" ]; then
            exit 0
          fi
          payload=$(jq -n \
            --arg channel_id "$MATTERMOST_CHANNEL_ID" \
            --arg message "[$REPO] PR #$PR_NUMBER: \"$PR_TITLE\" ($PR_AUTHOR) merged to main at $MERGED_AT\n$PR_URL" \
            '{channel_id: $channel_id, message: $message}')
          curl -fS -X POST \
            -H "Authorization: Bearer $MATTERMOST_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$MATTERMOST_BASE_URL/api/v4/posts"
