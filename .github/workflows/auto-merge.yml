name: Auto approve & merge Dependabot and Renovate PRs

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-approve-merge:
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      github.event.pull_request.user.login == 'dependabot' ||
      github.event.pull_request.user.login == 'renovate[bot]' ||
      github.event.pull_request.user.login == 'renovate'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install GitHub CLI and jq
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install -y gh jq

      - name: Auto approve PR
        uses: hmarr/auto-approve-action@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Dependabot metadata
        if: github.event.pull_request.user.login == 'dependabot[bot]' || github.event.pull_request.user.login == 'dependabot'
        id: metadata
        uses: dependabot/fetch-metadata@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if PR should be auto-merged
        id: check_auto_merge
        env:
          UPDATE_TYPE: ${{ steps.metadata.outputs['update-type'] }}
          ACTOR: ${{ github.event.pull_request.user.login }}
          LABELS: ${{ toJson(github.event.pull_request.labels) }}
        run: |
          UPDATE_TYPE="${UPDATE_TYPE:-unknown}"

          if [ "$ACTOR" == "dependabot[bot]" ] || [ "$ACTOR" == "dependabot" ]; then
            if [[ "$UPDATE_TYPE" == "version-update:semver-patch" ]] || [[ "$UPDATE_TYPE" == "version-update:semver-minor" ]]; then
              echo "auto_merge=true" >> $GITHUB_OUTPUT
              if [[ "$UPDATE_TYPE" == "version-update:semver-minor" ]]; then
                echo "level_label=minor" >> $GITHUB_OUTPUT
              else
                echo "level_label=patch" >> $GITHUB_OUTPUT
              fi
            else
              echo "auto_merge=false" >> $GITHUB_OUTPUT
              echo "update_type=${UPDATE_TYPE}" >> $GITHUB_OUTPUT
            fi
          elif [ "$ACTOR" == "renovate[bot]" ] || [ "$ACTOR" == "renovate" ]; then
            LABEL_NAMES=$(echo "$LABELS" | jq -r '.[].name' | tr '\n' ' ')
            if [[ "$LABEL_NAMES" == *"patch"* ]] || [[ "$LABEL_NAMES" == *"minor"* ]]; then
              echo "auto_merge=true" >> $GITHUB_OUTPUT
            else
              echo "auto_merge=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "auto_merge=false" >> $GITHUB_OUTPUT
            echo "update_type=${UPDATE_TYPE}" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Ensure patch/minor label exists (Dependabot only)
        if: steps.check_auto_merge.outputs.auto_merge == 'true' && (github.event.pull_request.user.login == 'dependabot[bot]' || github.event.pull_request.user.login == 'dependabot')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LEVEL_LABEL: ${{ steps.check_auto_merge.outputs.level_label }}
        run: |
          if [ -n "$LEVEL_LABEL" ]; then
            gh pr edit "$PR_NUMBER" --add-label "$LEVEL_LABEL" || true
          fi

      - name: Wait for CI checks
        if: steps.check_auto_merge.outputs.auto_merge == 'true'
        uses: lewagon/wait-on-check-action@v1.7.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30
          timeout-minutes: 30
          check-regexp: 'test'

      - name: Auto-merge PR
        if: steps.check_auto_merge.outputs.auto_merge == 'true'
        id: auto_merge_pr
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          MAX_RETRIES=40
          SLEEP=15

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i/$MAX_RETRIES"

            pr_json=$(gh pr view "$PR_NUMBER" --json mergeable,mergeStateStatus)
            mergeable=$(echo "$pr_json" | jq -r '.mergeable')
            state=$(echo "$pr_json" | jq -r '.mergeStateStatus')

            echo "mergeable=$mergeable mergeStateStatus=$state"

            if [[ "$mergeable" == "MERGEABLE" && "$state" == "CLEAN" ]]; then
              echo "PR is mergeable, attempting merge..."
              if gh pr merge --merge "$PR_NUMBER"; then
                echo "merge_succeeded=true" >> $GITHUB_OUTPUT
                exit 0
              fi
            fi

            sleep $SLEEP
          done

          echo "merge_succeeded=false" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Mattermost about merge
        if: steps.check_auto_merge.outputs.auto_merge == 'true' && steps.auto_merge_pr.outputs.merge_succeeded == 'true'
        env:
          MATTERMOST_BOT_TOKEN: ${{ secrets.MATTERMOST_BOT_TOKEN }}
          MATTERMOST_CHANNEL_ID: ${{ secrets.MATTERMOST_CHANNEL_ID }}
          MATTERMOST_BASE_URL: ${{ secrets.MATTERMOST_BASE_URL }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          missing=""
          if [ -z "${MATTERMOST_BOT_TOKEN:-}" ]; then missing="$missing MATTERMOST_BOT_TOKEN"; fi
          if [ -z "${MATTERMOST_CHANNEL_ID:-}" ]; then missing="$missing MATTERMOST_CHANNEL_ID"; fi
          if [ -z "${MATTERMOST_BASE_URL:-}" ]; then missing="$missing MATTERMOST_BASE_URL"; fi
          if [ -n "$missing" ]; then
            echo "Mattermost notification skipped; missing secrets:$missing" >&2
            exit 0
          fi
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          payload=$(jq -n \
            --arg channel_id "$MATTERMOST_CHANNEL_ID" \
            --arg message "🤖 [$REPO] PR #$PR_NUMBER: \"$PR_TITLE\" was auto-merged by $PR_AUTHOR.\nMerged at: $TIMESTAMP\nLink: $PR_URL" \
            '{channel_id: $channel_id, message: $message}')
          http_code=$(curl -sS -o /tmp/mm_resp.txt -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $MATTERMOST_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$MATTERMOST_BASE_URL/api/v4/posts" || true)
          if [ "$http_code" != "201" ]; then
            echo "Mattermost notify failed (HTTP $http_code)" >&2
            cat /tmp/mm_resp.txt >&2 || true
            exit 1
          fi
          echo "Mattermost notified (HTTP 201)"
